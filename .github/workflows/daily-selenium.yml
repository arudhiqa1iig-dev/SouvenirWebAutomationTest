name: Daily Selenium Tests

on:
  push:
    branches: [main]
  schedule:
    # Times are UTC. Nepal is UTC+5:45.
    - cron: "15 0 * * *"   # 06:00 Nepal time
    - cron: "15 12 * * *"  # 18:00 Nepal time
  workflow_dispatch:

# Drop the least privilege needed; this job only reads the repo.
permissions:
  contents: read

# A new run cancels an in-progress run of the same workflow.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selenium:
    name: Run Selenium suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Install Chrome only. We deliberately DO NOT use this action's
      # install-chromedriver: it pairs the installed Chrome (149) with a
      # driver one version ahead (150), which fails. Instead we point
      # Selenium at this exact Chrome binary (CHROME_BIN below) and let
      # Selenium Manager download the driver that matches it.
      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          # Point Selenium at the exact Chrome setup-chrome installed.
          # Selenium Manager reads this binary's version and downloads a
          # matching driver, so versions can never drift apart.
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: pytest

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7
