name: Daily Selenium Tests

on:
  push:
    branches: [main]
  schedule:
    # Times are UTC. Nepal is UTC+5:45.
    - cron: "15 0 * * *"   # 06:00 Nepal time
    - cron: "15 12 * * *"  # 18:00 Nepal time
  workflow_dispatch:

# Drop the least privilege needed; this job only reads the repo.
permissions:
  contents: read

# A new run cancels an in-progress run of the same workflow.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selenium:
    name: Run Selenium suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Install Chrome AND a matching ChromeDriver from the same action so
      # their versions always agree. setup-chrome exports CHROMEDRIVER_PATH;
      # we hand that exact binary to Selenium below (CHROMEDRIVER env), so a
      # stale driver sitting elsewhere in PATH can never be picked instead.
      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          # Pin Selenium to the driver setup-chrome just installed, so it
          # matches the installed Chrome exactly (no PATH-driver mismatch).
          CHROMEDRIVER: ${{ steps.setup-chrome.outputs.chromedriver-path }}
        run: pytest

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 7
